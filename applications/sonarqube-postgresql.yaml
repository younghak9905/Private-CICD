apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sonarqube-postgresql
  namespace: argocd
spec:
  project: default
  source:
    repoURL: http://gitea-http.gitea.svc.cluster.local:3000/gitea-admin/platform-gitops.git
    targetRevision: main
    path: apps/sonarqube-postgresql
    helm:
      releaseName: sonarqube-postgresql
  destination:
    server: https://kubernetes.default.svc
    namespace: sonarqube
  syncPolicy:
    syncOptions:
      - CreateNamespace=true

